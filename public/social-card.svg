<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Eid Congrats App social card</title>
  <desc id="desc">A festive Eid-themed social card with a crescent moon, lanterns, and the app title.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f426d" />
      <stop offset="45%" stop-color="#0a2442" />
      <stop offset="100%" stop-color="#061224" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="62%">
      <stop offset="0%" stop-color="#f9cf7b" stop-opacity=".28" />
      <stop offset="60%" stop-color="#f9cf7b" stop-opacity=".05" />
      <stop offset="100%" stop-color="#f9cf7b" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="moon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe8b4" />
      <stop offset="100%" stop-color="#f2b24b" />
    </linearGradient>
    <linearGradient id="lantern" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd79a" />
      <stop offset="100%" stop-color="#d48c26" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glow)" />
  <circle cx="882" cy="160" r="124" fill="#f7d99b" opacity=".2" />
  <circle cx="846" cy="175" r="88" fill="url(#moon)" />
  <circle cx="886" cy="152" r="84" fill="#0a2442" />
  <g opacity=".92">
    <path d="M190 0v118" stroke="#f4e7be" stroke-width="4" stroke-linecap="round" opacity=".5" />
    <rect x="156" y="118" width="68" height="96" rx="18" fill="url(#lantern)" />
    <rect x="170" y="98" width="40" height="24" rx="8" fill="#f3c26f" />
    <rect x="176" y="138" width="28" height="40" rx="12" fill="#fff1cd" opacity=".72" />
  </g>
  <g opacity=".78">
    <path d="M1010 0v90" stroke="#f4e7be" stroke-width="4" stroke-linecap="round" opacity=".5" />
    <rect x="978" y="90" width="64" height="88" rx="18" fill="url(#lantern)" />
    <rect x="990" y="72" width="40" height="20" rx="8" fill="#f3c26f" />
    <rect x="996" y="106" width="28" height="36" rx="12" fill="#fff1cd" opacity=".68" />
  </g>
  <path d="M130 470c126-106 258-159 396-159 149 0 289 56 420 168" fill="none" stroke="#3db386" stroke-width="10" stroke-linecap="round" opacity=".8" />
  <text x="120" y="220" fill="#fbe8bd" font-size="34" font-family="Segoe UI, Arial, sans-serif" letter-spacing="5">
    EID MUBARAK
  </text>
  <text x="120" y="318" fill="#ffffff" font-size="82" font-weight="700" font-family="Segoe UI, Arial, sans-serif">
    Eid Congrats App
  </text>
  <text x="120" y="392" fill="#d8e7f8" font-size="34" font-family="Segoe UI, Arial, sans-serif">
    Create and share one polished Eid greeting link
  </text>
  <text x="120" y="438" fill="#c3d9ef" font-size="30" font-family="Segoe UI, Arial, sans-serif">
